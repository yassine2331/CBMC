name: env
channels:
  - pytorch
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - setuptools
  - wheel
  - matplotlib=3.10.8
  - pip:
      - "torch>=2.0"
      - "torchvision>=0.15"
      - "diffusers>=0.27"
      - "transformers>=4.40"
      - "accelerate>=0.30"
      - "datasets>=0.1.2"
      - "sympytorch==0.1.4"
